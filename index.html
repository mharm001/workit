  // ─── Helpers ────────────────────────────────────────────────────
  const uid = () => Math.random().toString(36).slice(2, 10);
  const DAYS = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
  const DAY_LABELS = {monday:"Mon",tuesday:"Tue",wednesday:"Wed",thursday:"Thu",friday:"Fri",saturday:"Sat",sunday:"Sun"};
  // Module-level: called on every render in multiple components — no allocation benefit to inlining
  const todayDay = () => DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const toDateStr = (d) => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  // Module-level fast hash: sum char codes of up to 200 chars + length suffix.
  // Defined here (not inside App) so it is never recreated per render.
  const _quickHash = (s) => { var h=0; for(var i=0;i<Math.min(s.length,200);i++) h=(h*31+s.charCodeAt(i))|0; return h+":"+s.length; };
  // Intensity scale: MAX=Maxed Out, HARD=Pushed Hard, LITE=Light Effort, W=Warmup
  const INTENSITY_OPTIONS = [
    { value: 0, label: "Maxed Out", short: "MAX", color: "#ef4444" },
    { value: 1, label: "Pushed Hard", short: "HARD", color: "#fb923c" },
    { value: 2, label: "Light Effort", short: "LITE", color: "#facc15" },
    { value: 3, label: "Warmup", short: "W", color: "#71717a" },
  ];
  const intensityColor = (v) => (INTENSITY_OPTIONS.find(r=>r.value===v)||INTENSITY_OPTIONS[1]).color;
  const intensityLabel = (v) => (INTENSITY_OPTIONS.find(r=>r.value===v)||INTENSITY_OPTIONS[1]).short;
  // Legacy effort → intensity migration: map old 1-10 effort to new intensity values
  const effortToIntensity = (v) => v >= 9 ? 0 : v >= 7 ? 1 : v >= 4 ? 2 : 3;
  // Strength Score: Epley e1RM = weight × (1 + reps/30). Returns 0 for bodyweight/invalid.
  const calcE1RM = (weight, reps) => (weight > 0 && reps > 0) ? Math.round(weight * (1 + reps / 30)) : 0;

  // ─── Exercise Helpers ────────────────────────────────────────────
  // Build a reverse lookup: exercise name → category
  const _exCatMap = {};
  Object.entries(EXERCISE_LIBRARY).forEach(([cat, exs]) => exs.forEach(ex => { _exCatMap[ex.name] = cat; }));
  const getExerciseCategory = (name) => {
    if (!name) return null;
    if (_exCatMap[name]) return _exCatMap[name];
    var lc = name.toLowerCase();
    if (!lc) return null;
    // 1. Prefix match (either direction)
    for (var k in _exCatMap) { var kl = k.toLowerCase(); if (kl.startsWith(lc) || lc.startsWith(kl)) return _exCatMap[k]; }
    // 2. Substring match: "Lateral Raises" found inside "Dumbbell Lateral Raises"
    for (var k in _exCatMap) { var kl = k.toLowerCase(); if (kl.includes(lc) || lc.includes(kl)) return _exCatMap[k]; }
    // 3. Word overlap: all significant words in input appear in a library entry
    var words = lc.split(/\s+/).filter(function(w) { return w.length > 2; });
    if (words.length > 0) {
      var best = null, bestCount = 0;
      for (var k in _exCatMap) {
        var kl = k.toLowerCase(), count = 0;
        words.forEach(function(w) { if (kl.includes(w)) count++; });
        if (count > bestCount) { bestCount = count; best = k; }
      }
      if (best && bestCount >= Math.max(1, Math.ceil(words.length / 2))) return _exCatMap[best];
    }
    return null;
  };

  function loadLocal() {

      if (!raw) return null;

      delete data._trackingSession;
      return { ...data, trackingSession: session };

  // SHEETS SERVICE
  // ═══════════════════════════════════════════════════════════════════
  const sheetsService = {
    accessToken: null,
    spreadsheetId: null,

    async _fetch(url, options) {
      options = options || {};
      const res = await fetch(url, { ...options, headers: { "Authorization": "Bearer " + this.accessToken, "Content-Type": "application/json", ...(options.headers||{}) } });
      if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error((err.error||{}).message || "API error " + res.status); }
      return res.json();
    },

    async findSpreadsheet() {
      const q = encodeURIComponent("name='" + SPREADSHEET_NAME + "' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false");
      const data = await this._fetch(DRIVE_API + "?q=" + q + "&spaces=drive&fields=files(id,name)");
      return (data.files||[])[0] ? data.files[0].id : null;
    },

    async createSpreadsheet() {
      const data = await this._fetch(SHEETS_API, { method: "POST", body: JSON.stringify({
        properties: { title: SPREADSHEET_NAME },
        sheets: [{properties:{title:"config",index:0}},{properties:{title:"history",index:1}},{properties:{title:"weight",index:2}}],
      })});
      this.spreadsheetId = data.spreadsheetId;
      await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values:batchUpdate", { method:"POST", body: JSON.stringify({ valueInputOption:"RAW", data:[
        {range:"config!A1:B1",values:[["key","value"]]},
        {range:"history!A1:H1",values:[["Date","Workout","Exercise","Set #","Reps","Weight","Intensity","Warmup"]]},
        {range:"weight!A1:C1",values:[["Date","Weight (lbs)","Body Fat %"]]}
      ]})});
      return this.spreadsheetId;
    },

    async _getValues(range) {
      const d = await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range));
      return d.values || [];
    },

    async _clearAndWrite(range, values) {
      await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range)+":clear",{method:"POST",body:"{}"});
      if (values.length > 0) await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range)+"?valueInputOption=RAW",{method:"PUT",body:JSON.stringify({range,values})});
    },

    // ── Flatten history entries into rows: Date | Workout | Exercise | Set# | Reps | Weight | Intensity | Warmup
    _flattenHistory(history) {
      const rows = [["Date","Workout","Exercise","Set #","Reps","Weight","Intensity","Warmup"]];
      history.forEach(function(entry) {
        (entry.exercises||[]).forEach(function(ex) {
          (ex.sets||[]).forEach(function(set, si) {
            var rir = set.rir !== undefined ? set.rir : (set.effort !== undefined ? effortToIntensity(set.effort) : 2);
            var warmup = set.warmup || rir === 3;
            rows.push([entry.date, entry.workoutName||"Unknown", ex.name, si+1, set.reps, set.weight, rir, warmup?"Y":"N"]);
          });
        });
      });
      return rows;
    },

    // ── Parse flat history rows back into structured entries grouped by date+workout
    _parseHistory(rows) {
      const groups = {};
      rows.forEach(function(r) {
        if (!r[0] || r[0]==="Date") return;
        var key = r[0] + "|" + (r[1]||"");
        if (!groups[key]) groups[key] = { date: r[0], workoutId: null, workoutName: r[1]||"Unknown", wasOverride: false, exercises: {} };
        var exName = r[2]||"";
        if (!groups[key].exercises[exName]) groups[key].exercises[exName] = { exerciseId: exName, name: exName, sets: [] };
        // Support both old (7-col effort) and new (8-col intensity+warmup) format
        var rir = r.length >= 8 ? (r[6] != null && r[6] !== "" ? parseInt(r[6]) : 2) : (r[6] !== undefined ? effortToIntensity(parseInt(r[6])||5) : 2);
        var warmup = r.length >= 8 ? r[7]==="Y" : false;
        groups[key].exercises[exName].sets.push({ reps: parseInt(r[4])||0, weight: parseFloat(r[5])||0, rir: rir, warmup: warmup });
      });
      return Object.values(groups).map(function(g) {
        return { date: g.date, workoutId: g.workoutId, workoutName: g.workoutName, wasOverride: g.wasOverride, exercises: Object.values(g.exercises) };
      });
    },

    async loadAll() {
      // Try reading all tabs, including legacy "workouts" tab for backward compat
      const [configRows, historyRows, weightRows] = await Promise.all([
        this._getValues("config!A2:B200"), this._getValues("history!A2:H50000"), this._getValues("weight!A2:C1000")
      ]);
      // Also try legacy workouts tab (old format had separate workouts sheet)
      let legacyWorkoutRows = [];
      try { legacyWorkoutRows = await this._getValues("workouts!A2:B1000"); } catch(e) {}

      const config = {};
      configRows.forEach(function(r){ try{config[r[0]]=JSON.parse(r[1])}catch(e){ console.warn("Config parse failed for",r[0]); config[r[0]]=r[1]} });

      // Load workouts: prefer config.workouts, fall back to legacy workouts tab
      let workouts = config.workouts || {};
      if (Object.keys(workouts).length === 0 && legacyWorkoutRows.length > 0) {
        legacyWorkoutRows.forEach(function(r){ try{workouts[r[0]]=JSON.parse(r[1])}catch(e){} });
      }

      // Detect history format: old format has 2 columns (date, json), new has 7 columns
      let history;
      if (historyRows.length > 0 && historyRows[0].length <= 2) {
        // Legacy format: parse JSON blobs
        history = historyRows.map(function(r){ try{return JSON.parse(r[1])}catch(e){return null} }).filter(Boolean);
      } else {
        // New flat format
        history = this._parseHistory(historyRows);
      }

      // Restore workoutId references by matching workout names
      history.forEach(function(h) {
        if (!h.workoutId || !workouts[h.workoutId]) {
          Object.entries(workouts).forEach(function(e) { if (e[1].name === h.workoutName) h.workoutId = e[0]; });
        }
      });
      const weightLog = weightRows.map(function(r){ var bf=r[2]?parseFloat(r[2]):null; return {date:r[0],weight:parseFloat(r[1]),bodyFat:(!isNaN(bf)&&bf>0)?bf:null} }).filter(function(w){return !isNaN(w.weight)});
      return {
        scheduleType: config.scheduleType || "weekly",
        weeklySchedule: config.weeklySchedule || DAYS.map(function(d){return{day:d,workoutId:null}}),
        cadenceSchedule: config.cadenceSchedule || {restMode:"manual",autoRestEvery:3,rotation:[],currentIndex:0},
        workouts: workouts, history: history, weightLog: weightLog,
        weightUnit: config.weightUnit || "lbs",
      };
    },

    async resetSpreadsheet() {
      if (!this.spreadsheetId) return;
      await Promise.all([
        this._clearAndWrite("config!A1:B200", [["key","value"]]),
        this._clearAndWrite("history!A1:H50000", [["Date","Workout","Exercise","Set #","Reps","Weight","Intensity","Warmup"]]),
        this._clearAndWrite("weight!A1:C1000", [["Date","Weight (lbs)","Body Fat %"]]),
      ]);
    },

    async saveAll(state) {
      const configVals = [["key","value"],
        ["scheduleType",JSON.stringify(state.scheduleType)],
        ["weeklySchedule",JSON.stringify(state.weeklySchedule)],
        ["cadenceSchedule",JSON.stringify(state.cadenceSchedule)],
        ["workouts",JSON.stringify(state.workouts)],
        ["weightUnit",JSON.stringify(state.weightUnit||"lbs")]
      ];
      const historyVals = this._flattenHistory(state.history);
      const unit = state.weightUnit||"lbs";
      const weightVals = [["Date","Weight ("+unit+")","Body Fat %"]].concat(state.weightLog.map(function(w){return[w.date,String(w.weight),w.bodyFat!=null?String(w.bodyFat):""]}));
      await Promise.all([
        this._clearAndWrite("config!A1:B200", configVals),
        this._clearAndWrite("history!A1:H50000", historyVals),
        this._clearAndWrite("weight!A1:C1000", weightVals),
      ]);
    },
  };

  // ─── State ──────────────────────────────────────────────────────
  const makeInitialState = () => ({
    scheduleType: "weekly",
    weeklySchedule: DAYS.map(d => ({ day: d, workoutId: null })),
    cadenceSchedule: { restMode: "manual", autoRestEvery: 3, rotation: [], currentIndex: 0 },
    workouts: {}, history: [], weightLog: [],
    weightUnit: "lbs",
    activeView: "dashboard", trackingSession: null,
  });

  function reducer(state, action) {
    switch (action.type) {
      case "SET_VIEW": return { ...state, activeView: action.view };
      case "SET_SCHEDULE_TYPE": return { ...state, scheduleType: action.scheduleType };
      case "SET_WEEKLY_SCHEDULE": return { ...state, weeklySchedule: action.schedule };
      case "SET_CADENCE_SCHEDULE": return { ...state, cadenceSchedule: { ...state.cadenceSchedule, ...action.data } };
      case "UPSERT_WORKOUT": { const id = action.workout.id || uid(); return { ...state, workouts: { ...state.workouts, [id]: { ...action.workout, id } } }; }
      case "DELETE_WORKOUT": {
        const w = Object.fromEntries(Object.entries(state.workouts).filter(([k]) => k !== action.id));
        return { ...state, workouts: w,
          weeklySchedule: state.weeklySchedule.map(d => d.workoutId === action.id ? { ...d, workoutId: null } : d),
          cadenceSchedule: { ...state.cadenceSchedule, rotation: state.cadenceSchedule.rotation.filter(r => r.workoutId !== action.id) },
        };
      }
      case "START_TRACKING": return { ...state, trackingSession: action.session, activeView: "tracking" };
      case "EDIT_WORKOUT": return { ...state, trackingSession: { ...action.session, editingDate: action.editingDate }, activeView: "tracking" };
      case "UPDATE_TRACKING": return { ...state, trackingSession: { ...state.trackingSession, ...action.data } };
      case "SAVE_WORKOUT": {
        const s = state.trackingSession;
        const entry = { date: s.editingDate || toDateStr(new Date()), workoutId: s.workoutId, workoutName: (state.workouts[s.workoutId]||{}).name||"Unknown", wasOverride: s.wasOverride||false, exercises: s.exercises };
        let hist = state.history;
        if (s.editingDate) {
          hist = state.history.map(h => h.date === s.editingDate && h.workoutId === s.workoutId ? entry : h);
        } else {
          hist = [...state.history, entry];
        }
        let cad = state.cadenceSchedule;
        if (!s.editingDate && state.scheduleType === "cadence" && cad.rotation.length > 0) cad = { ...cad, currentIndex: (cad.currentIndex + 1) % cad.rotation.length };
        return { ...state, history: hist, cadenceSchedule: cad, trackingSession: null, activeView: "dashboard" };
      }
      case "CANCEL_TRACKING": return { ...state, trackingSession: null, activeView: "dashboard" };
      case "DELETE_HISTORY_ENTRY": return { ...state, history: state.history.filter(h => !(h.date === action.date && h.workoutId === action.workoutId)), trackingSession: null, activeView: "dashboard" };
      case "OVERRIDE_TODAY": {
        if (state.scheduleType === "weekly") {
          const ti = state.weeklySchedule.findIndex(d => d.day === todayDay());
          const oi = state.weeklySchedule.findIndex(d => d.workoutId === action.newWorkoutId);
          if (ti >= 0 && oi >= 0) { const sc = [...state.weeklySchedule]; const tmp = sc[ti].workoutId; sc[ti]={...sc[ti],workoutId:action.newWorkoutId}; sc[oi]={...sc[oi],workoutId:tmp}; return{...state,weeklySchedule:sc}; }
        } else {
          const idx = state.cadenceSchedule.rotation.findIndex(r => r.workoutId === action.newWorkoutId);
          if (idx >= 0) return { ...state, cadenceSchedule: { ...state.cadenceSchedule, currentIndex: idx } };
        }
        return state;
      }
      case "LOG_WEIGHT": {
        const existing = state.weightLog.find(w => w.date === action.date);
        const entry = { date: action.date, weight: action.weight != null ? action.weight : (existing ? existing.weight : null), bodyFat: action.bodyFat != null ? action.bodyFat : (existing ? existing.bodyFat : null) };
        return { ...state, weightLog: [...state.weightLog.filter(w => w.date !== entry.date), entry].filter(w => w.weight != null).sort((a,b)=>a.date.localeCompare(b.date)) };
      }
      case "SET_WEIGHT_UNIT": return { ...state, weightUnit: action.unit };
      case "LOAD_FROM_SHEETS": return { ...state, ...action.data };
      case "IMPORT_STATE": {
        const allowed = ["scheduleType","weeklySchedule","cadenceSchedule","workouts","history","weightLog","weightUnit"];
        const clean = {}; allowed.forEach(k => { if (action.state[k] !== undefined) clean[k] = action.state[k]; });
        return { ...state, ...clean, activeView: "dashboard", trackingSession: null };
      }
      default: console.warn("Unknown action:", action.type); return state;
    }
  }

  // ERROR BOUNDARY
  // ═══════════════════════════════════════════════════════════════════
  class ErrorBoundary extends Component {
    constructor(props) {
      super(props);
      this.state = { hasError: false, error: null };
    }
    static getDerivedStateFromError(error) {
      return { hasError: true, error };
    }
    componentDidCatch(error, info) {
      console.error("[WorkIt ErrorBoundary]", error, info);
    }
    render() {
      if (this.state.hasError) {
        return e("div", { style: { padding: 32, textAlign: "center" } },
          e("div", { style: { fontSize: 32, marginBottom: 12 } }, "⚠️"),
          e("div", { style: { fontSize: 16, fontWeight: 700, color: "#f4f4f5", marginBottom: 8 } }, "Something went wrong"),
          e("div", { style: { fontSize: 13, color: "#a1a1aa", marginBottom: 20 } }, this.state.error ? this.state.error.message : "An unexpected error occurred."),
          e("button", { className: "btn btn-accent", onClick: () => this.setState({ hasError: false, error: null }) }, "Try again"),
        );
      }
      return this.props.children;
    }
  }

  // ═══════════════════════════════════════════════════════════════════
  // MINI CHART (SVG-based, no external dependency)
  // ═══════════════════════════════════════════════════════════════════
  const MiniLineChart = React.memo(function MiniLineChart({ data, dataKey, width, height, color, label }) {
    if (!data || data.length < 2) return e("p", { style: { color: "#71717a", fontSize: 12, textAlign: "center", padding: "24px 0" } }, "Not enough data yet");
    const vals = data.map(d => d[dataKey]);
    const min = Math.min(...vals); const max = Math.max(...vals);
    const range = max - min || 1;
    const w = width || 320; const h = height || 150;
    const pad = 40;
    const points = data.map((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - ((d[dataKey] - min) / range) * (h - pad * 2);
      return { x, y, ...d };
    });
    const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");
    return e("div", { style: { overflowX: "auto" } },
      e("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h, style: { display: "block", margin: "0 auto" } },
        // Grid lines
        [0, 0.25, 0.5, 0.75, 1].map((f, i) => {
          const y = h - pad - f * (h - pad * 2);
          const val = (min + f * range).toFixed(0);
          return e("g", { key: i },
            e("line", { x1: pad, y1: y, x2: w - pad, y2: y, stroke: "#3f3f46", strokeDasharray: "3,3" }),
            e("text", { x: pad - 4, y: y + 4, textAnchor: "end", fill: "#71717a", fontSize: 9 }, val),
          );
        }),
        // X labels
        data.length <= 12 ? points.map((p, i) =>
          e("text", { key: "x" + i, x: p.x, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 9 }, p.date)
        ) : [0, Math.floor(data.length/2), data.length-1].map(i =>
          e("text", { key: "x" + i, x: points[i].x, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 9 }, points[i].date)
        ),
        // Line
        e("path", { d: pathD, fill: "none", stroke: color || "#f97316", strokeWidth: 2 }),
        // Dots
        points.map((p, i) => e("circle", { key: i, cx: p.x, cy: p.y, r: 3, fill: color || "#f97316" })),
        // Label
        label && e("text", { x: w/2, y: 12, textAnchor: "middle", fill: "#a1a1aa", fontSize: 10 }, label),
      )
    );
  });

  const MiniBarChart = React.memo(function MiniBarChart({ data, dataKey, width, height, color, label }) {
    if (!data || data.length === 0) return e("p", { style: { color: "#71717a", fontSize: 12, textAlign: "center", padding: "24px 0" } }, "No data");
    const vals = data.map(d => d[dataKey]);
    const max = Math.max(...vals) || 1;
    const w = width || 320; const h = height || 150;
    const pad = 40;
    const barW = Math.max(8, Math.min(24, (w - pad * 2) / data.length - 2));
    return e("div", { style: { overflowX: "auto" } },
      e("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h, style: { display: "block", margin: "0 auto" } },
        // Y axis labels
        [0, 0.5, 1].map((f, i) => {
          const y = h - pad - f * (h - pad * 2);
          return e("g", { key: i },
            e("line", { x1: pad, y1: y, x2: w - pad, y2: y, stroke: "#3f3f46", strokeDasharray: "3,3" }),
            e("text", { x: pad - 4, y: y + 4, textAnchor: "end", fill: "#71717a", fontSize: 9 }, (f * max).toFixed(0)),
          );
        }),
        // Bars
        data.map((d, i) => {
          const barH = (d[dataKey] / max) * (h - pad * 2);
          const x = pad + (i / data.length) * (w - pad * 2) + (w - pad * 2) / data.length / 2 - barW / 2;
          const y = h - pad - barH;
          return e("g", { key: i },
            e("rect", { x: x, y: y, width: barW, height: barH, fill: color || "#f97316", rx: 3 }),
            data.length <= 12 && e("text", { x: x + barW / 2, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 8 }, d.date),

  // NUMERIC STEPPER
  // Inline +/- stepper with direct-type support. ONE tap changes the value.
  // - Tap −/+ to decrement/increment by `step`.
  // - Tap the number to focus it; all text is selected so you just type.
  // - Works with keyboard (arrow keys also step while focused).
  // - Fits any grid cell; the touch targets extend to full cell height.

  function NumericStepper({ value, onChange, step, min, max, placeholder, name, inputMode }) {
    const inputRef = useRef(null);
    // Local string state so the user can type freely (e.g. "1" before "135")
    const [text, setText] = useState(value > 0 ? String(value) : "");

    // Keep display in sync when parent value changes from outside (e.g. copy-down)
    useEffect(() => {
      setText(value > 0 ? String(value) : "");
    }, [value]);

    const commit = (raw) => {
      const n = parseFloat(raw);
      if (!isNaN(n) && n >= 0) onChange(n);
      else if (raw === "" || raw === "0") onChange(0);
    };

    const step_ = step || 1;
    const min_ = min !== undefined ? min : 0;

    const decrement = (ev) => {
      ev.preventDefault();
      const cur = parseFloat(text) || 0;
      const next = Math.max(min_, Math.round((cur - step_) * 100) / 100);
      setText(next > 0 ? String(next) : "");
      onChange(next);
    };

    const increment = (ev) => {
      ev.preventDefault();
      const cur = parseFloat(text) || 0;
      const next = max !== undefined
        ? Math.min(max, Math.round((cur + step_) * 100) / 100)
        : Math.round((cur + step_) * 100) / 100;
      setText(String(next));
      onChange(next);
    };

    const handleFocus = (ev) => {
      var el = ev.target;
      el.select();
      // iOS/Android sometimes undo select() during the tap — retry after a tick
      setTimeout(function() { el.select(); }, 0);
    };

    const handleChange = (ev) => {
      const raw = ev.target.value;
      // Allow digits, one decimal point, empty string
      if (raw === "" || /^\d*\.?\d*$/.test(raw)) {
        setText(raw);
        commit(raw);
      }
    };

    const handleKeyDown = (ev) => {
      if (ev.key === "ArrowUp") { ev.preventDefault(); increment(ev); }
      if (ev.key === "ArrowDown") { ev.preventDefault(); decrement(ev); }
    };

      e("input", {
        ref: inputRef,
        name: name,
        type: "text",
        inputMode: inputMode || "decimal",
        pattern: "[0-9]*\\.?[0-9]*",
        value: text,
        placeholder: placeholder || "",
        onFocus: handleFocus,
        onChange: handleChange,
        onKeyDown: handleKeyDown,
      }),
    );
  }

          e("div", { style: { background: "#1c1c1e", borderRadius: 16, width: "calc(100% - 32px)", maxWidth: 480, maxHeight: "70vh", display: "flex", flexDirection: "column", overflow: "hidden" }, onClick: function(ev) { ev.stopPropagation(); } },
            // Drag handle
            e("div", { style: { display: "flex", justifyContent: "center", padding: "10px 0 4px" } },
              e("div", { style: { width: 32, height: 4, borderRadius: 2, background: "#3f3f46" } }),

                }) : swapSearch && e("div", { style: { padding: "12px 0", textAlign: "center", color: "#52525b", fontSize: 13 } }, "No matches for \u201c" + swapSearch + "\u201d"),

  // ═══════════════════════════════════════════════════════════════════
  // ANALYTICS
  // ═══════════════════════════════════════════════════════════════════
  function Analytics({ state }) {
    const [selEx, setSelEx] = useState("");
    const [selW, setSelW] = useState("");
    const allEx = useMemo(()=>{const n=new Set();state.history.forEach(h=>h.exercises.forEach(x=>n.add(x.name)));return[...n].sort();},[state.history]);
    const allWN = useMemo(()=>{const n=new Set();state.history.forEach(h=>n.add(h.workoutName));return[...n].sort();},[state.history]);

    const exTrend = useMemo(()=>{
      if(!selEx)return[];
      return state.history.filter(h=>h.exercises.some(x=>x.name===selEx)).map(h=>{
        const x=h.exercises.find(ex=>ex.name===selEx);
        const workSets=x.sets.filter(s=>!s.warmup&&(s.rir===undefined||s.rir!==3));
        const bestE1RM=workSets.length?Math.max(...workSets.map(s=>calcE1RM(s.weight,s.reps))):0;
        return{date:h.date.slice(5),maxWeight:workSets.length?Math.max(...workSets.map(s=>s.weight)):0,totalReps:workSets.reduce((a,s)=>a+s.reps,0),avgRir:workSets.length?Math.round(workSets.reduce((a,s)=>a+(s.rir!==undefined?s.rir:2),0)/workSets.length*10)/10:0,strengthScore:bestE1RM};
      });
    },[selEx,state.history]);

    const volTrend = useMemo(()=>{
      return(selW?state.history.filter(h=>h.workoutName===selW):state.history).map(h=>({date:h.date.slice(5),volume:h.exercises.reduce((a,x)=>a+x.sets.filter(s=>!s.warmup&&(s.rir===undefined||s.rir!==3)).reduce((b,s)=>b+s.reps*s.weight,0),0)}));
    },[selW,state.history]);

    const intensityTrend = useMemo(()=>{
      return(selW?state.history.filter(h=>h.workoutName===selW):state.history).map(h=>{
        const workSets=h.exercises.flatMap(x=>x.sets).filter(s=>!s.warmup&&(s.rir===undefined||s.rir!==3));
        if(!workSets.length)return null;
        const avg=Math.round(workSets.reduce((a,s)=>a+(s.rir!==undefined?s.rir:2),0)/workSets.length*10)/10;
        return{date:h.date.slice(5),avgRir:avg};
      }).filter(Boolean);
    },[selW,state.history]);

    const weightData = state.weightLog.filter(w => w.weight).map(w => ({ date: w.date.slice(5), weight: w.weight }));
    const bfData = state.weightLog.filter(w => w.bodyFat != null).map(w => ({ date: w.date.slice(5), bf: w.bodyFat }));

    const prData = useMemo(()=>{
      var r={};
      var sorted=state.history.slice().sort((a,b)=>a.date.localeCompare(b.date));
      sorted.forEach(h=>h.exercises.forEach(x=>x.sets.filter(s=>!s.warmup&&(s.rir===undefined||s.rir!==3)).forEach(s=>{
        var e1rm=calcE1RM(s.weight,s.reps); if(!e1rm)return;
        if(!r[x.name])r[x.name]={weight:s.weight,reps:s.reps,date:h.date,e1rm:e1rm,prevE1rm:0};
        else if(e1rm>r[x.name].e1rm){r[x.name]={prevE1rm:r[x.name].e1rm,weight:s.weight,reps:s.reps,date:h.date,e1rm:e1rm};}
      })));
      var now=new Date();var cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-14);var cutStr=toDateStr(cutoff);
      var all=Object.entries(r).filter(([,v])=>v.e1rm>0).map(([name,pr])=>({
        name:name,cat:getExerciseCategory(name)||"Other",e1rm:pr.e1rm,weight:pr.weight,reps:pr.reps,date:pr.date,
        delta:pr.prevE1rm>0?pr.e1rm-pr.prevE1rm:0,isRecent:pr.date>=cutStr
      }));
      var recentCount=all.filter(p=>p.isRecent).length;
      var grouped={};all.forEach(p=>{if(!grouped[p.cat])grouped[p.cat]=[];grouped[p.cat].push(p);});
      // Sort each group: recent first (by date desc), then rest by e1rm desc
      Object.values(grouped).forEach(g=>g.sort((a,b)=>{if(a.isRecent&&!b.isRecent)return -1;if(!a.isRecent&&b.isRecent)return 1;return b.e1rm-a.e1rm;}));
      var groupOrder=Object.keys(grouped).sort((a,b)=>(grouped[b][0]||{}).e1rm-(grouped[a][0]||{}).e1rm);
      return{recentCount:recentCount,grouped:grouped,groupOrder:groupOrder,total:all.length};
    },[state.history]);

    if (state.history.length === 0) return e("div", { style: { padding: 16 } },
      e("div", { className: "card", style: { textAlign: "center", padding: 32 } }, e("p", { className: "text-muted" }, "No data yet. Start tracking!"))
    );

    return e("div", { className: "fade-in", style: { padding: 16, display: "flex", flexDirection: "column", gap: 16 } },
      // Body composition
      (weightData.length > 1 || bfData.length > 1) && e("div", { className: "card" },
        e("div", { className: "label" }, "Body Composition"),
        e(BodyCompChart, { weightData: weightData, bfData: bfData, weightUnit: state.weightUnit, width: 340, height: 170 }),
      ),
      // Workout Trends (Intensity + Volume)
      e("div", { className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
          e("div", { className: "label", style: { margin: 0 } }, "Workout Trends"),
          e("select", { name: "filterWorkout", value: selW, onChange: ev => setSelW(ev.target.value), style: { fontSize: 12 } },
            e("option", { value: "" }, "All Workouts"),
            allWN.map(n => e("option", { key: n, value: n }, n)),
          ),
        ),
        // Intensity chart
        intensityTrend.length >= 2 ? (function(){
          var d=intensityTrend,w=340,h=130,pad=40;
          var pts=d.map(function(p,i){
            var x=pad+(i/(d.length-1))*(w-pad*2);
            var y=pad+((2.5-p.avgRir)/2.5)*(h-pad*2);
            var c=p.avgRir<=0.5?"#ef4444":p.avgRir<=1.5?"#fb923c":"#facc15";
            return{x:x,y:y,c:c,date:p.date,v:p.avgRir};
          });
          var pathD=pts.map(function(p,i){return(i===0?"M":"L")+p.x+","+p.y}).join(" ");
          return e("div",null,
            e("div",{style:{fontSize:10,color:"#71717a",fontWeight:600,marginBottom:4}},"Intensity"),
            e("div",{style:{overflowX:"auto"}},
              e("svg",{width:w,height:h,viewBox:"0 0 "+w+" "+h,style:{display:"block",margin:"0 auto"}},
                [["MAX",0],["HARD",1],["LITE",2]].map(function(pair){
                  var yy=pad+((2.5-pair[1])/2.5)*(h-pad*2);
                  var col=pair[1]===0?"#ef4444":pair[1]===1?"#fb923c":"#facc15";
                  return e("g",{key:pair[0]},
                    e("line",{x1:pad,y1:yy,x2:w-pad,y2:yy,stroke:"#3f3f46",strokeDasharray:"3,3"}),
                    e("text",{x:pad-6,y:yy+4,textAnchor:"end",fill:col,fontSize:10,fontWeight:600},pair[0]),
                  );
                }),
                e("path",{d:pathD,fill:"none",stroke:"#a1a1aa",strokeWidth:1.5}),
                pts.map(function(p,i){return e("circle",{key:i,cx:p.x,cy:p.y,r:4,fill:p.c})}),
              ),
            ),
            e("div",{style:{display:"flex",justifyContent:"center",gap:12,marginTop:4}},
              INTENSITY_OPTIONS.filter(function(o){return o.value!==3}).map(function(o){return e("span",{key:o.value,style:{fontSize:10,color:"#71717a",display:"flex",alignItems:"center",gap:3}},
                e("span",{style:{width:8,height:8,borderRadius:"50%",background:o.color,display:"inline-block"}}),o.short)}),
            ),
          );
        })() : e("p", { style: { color: "#52525b", fontSize: 13, textAlign: "center", padding: "24px 0" } }, "Track at least 2 workouts to see intensity trends"),
        // Volume sparkline
        volTrend.length >= 2 && (function(){
          var d=volTrend,w=340,h=48,pad=40,barGap=2;
          var maxV=Math.max.apply(null,d.map(function(p){return p.volume}))||1;
          var barW=Math.max(2,Math.min(12,(w-pad*2-barGap*(d.length-1))/d.length));
          var totalW=d.length*barW+(d.length-1)*barGap;
          var startX=pad+(w-pad*2-totalW)/2;
          return e("div",{style:{marginTop:8,borderTop:"1px solid #3f3f46",paddingTop:8}},
            e("div",{style:{fontSize:10,color:"#71717a",fontWeight:600,marginBottom:4}},"Volume"),
            e("svg",{width:w,height:h,viewBox:"0 0 "+w+" "+h,style:{display:"block",margin:"0 auto"}},
              d.map(function(p,i){
                var barH=Math.max(2,(p.volume/maxV)*(h-14));
                var x=startX+i*(barW+barGap);
                return e("rect",{key:i,x:x,y:h-4-barH,width:barW,height:barH,rx:1,fill:"#f97316",opacity:0.55});
              }),
              // Date labels: first, middle, last
              d.length>=2&&[0,Math.floor(d.length/2),d.length-1].map(function(i){
                var x=startX+i*(barW+barGap)+barW/2;
                return e("text",{key:"d"+i,x:x,y:h,textAnchor:"middle",fill:"#52525b",fontSize:7},d[i].date);
              }),
            ),
          );
        })(),
      ),
      // Exercise progress (only show when there's enough data)
      allEx.length > 0 && state.history.length >= 2 && e("div", { className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
          e("div", { className: "label", style: { margin: 0 } }, "Exercise Progress"),
          e("select", { name: "filterExercise", value: selEx, onChange: ev => setSelEx(ev.target.value), style: { fontSize: 12 } },
            e("option", { value: "" }, "Select exercise..."),
            allEx.map(n => e("option", { key: n, value: n }, n)),
          ),
        ),
        selEx ? e(React.Fragment, null,
          e(MiniLineChart, { data: exTrend, dataKey: "maxWeight", color: "#f97316", width: 340, height: 160, label: "Max Weight (" + state.weightUnit + ")" }),
          exTrend.some(function(p){return p.strengthScore>0}) && e("div", { style: { marginTop: 12, borderTop: "1px solid #3f3f46", paddingTop: 12 } },
            e(MiniLineChart, { data: exTrend, dataKey: "strengthScore", color: "#22d3ee", width: 340, height: 160, label: "Strength Score (est. 1RM)" }),
          ),
          exTrend.length >= 2 && e("div", { style: { marginTop: 12, borderTop: "1px solid #3f3f46", paddingTop: 12 } },
            e("div", { style: { fontSize: 11, color: "#71717a", marginBottom: 4 } }, "Avg Intensity"),
            e("div", { style: { display: "flex", gap: 4, flexWrap: "wrap" } },
              exTrend.map(function(p,i){var c=p.avgRir<=0.5?"#ef4444":p.avgRir<=1.5?"#fb923c":"#facc15";return e("div",{key:i,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
                e("div",{style:{width:20,height:20,borderRadius:4,background:c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#000"}},p.avgRir<=0.5?"MAX":p.avgRir<=1.5?"HARD":"LITE"),
                e("div",{style:{fontSize:7,color:"#52525b"}},p.date),
              )}),
            ),
          ),
        ) :
          e("p", { style: { color: "#52525b", fontSize: 13, textAlign: "center", padding: "24px 0" } }, "Select an exercise to see trends"),
      ),
      // Personal Records (unified)
      prData.total > 0 && e("div", { className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 } },
          e("div", { className: "label", style: { margin: 0 } }, "Personal Records"),
          e("span", { style: { fontSize: 10, color: "#52525b" } }, "est. 1RM \u00B7 Epley"),
        ),
        prData.recentCount > 0 && e("div", { style: { fontSize: 11, color: "#22c55e", marginBottom: 8 } }, "\uD83D\uDD25 " + prData.recentCount + " new in last 14 days"),
        prData.groupOrder.map(cat => e("div", { key: cat, style: { marginBottom: 14 } },
          e("div", { style: { fontSize: 11, fontWeight: 600, color: "#f97316", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 } }, cat),
          prData.grouped[cat].map(pr => e("div", { key: pr.name, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: pr.isRecent ? "linear-gradient(135deg, rgba(34,211,238,0.06), rgba(249,115,22,0.06))" : "rgba(63,63,70,0.5)", borderRadius: 8, padding: "8px 12px", marginBottom: 4, borderLeft: pr.isRecent ? "3px solid #22d3ee" : "3px solid transparent" } },
            e("div", { style: { minWidth: 0, flex: 1 } },
              e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
                e("span", { style: { fontSize: 13, fontWeight: pr.isRecent ? 600 : 400, color: "#e4e4e7" } }, pr.name),
                pr.isRecent && e("span", { style: { fontSize: 8, fontWeight: 700, color: "#22d3ee", background: "rgba(34,211,238,0.15)", padding: "1px 5px", borderRadius: 3, textTransform: "uppercase", letterSpacing: 0.5 } }, "new"),
              ),
              e("div", { style: { fontSize: 10, color: "#52525b" } }, pr.weight + " \u00D7 " + pr.reps + " \u00B7 " + pr.date),
            ),
            e("div", { style: { textAlign: "right", display: "flex", alignItems: "center", gap: 6, flexShrink: 0 } },
              e("div", null,
                e("span", { style: { fontSize: 14, fontWeight: 700, color: "#22d3ee" } }, pr.e1rm),
                e("span", { style: { fontSize: 10, color: "#71717a", marginLeft: 3 } }, state.weightUnit),
              ),
              pr.delta > 0 && e("span", { style: { fontSize: 11, fontWeight: 600, color: "#22c55e" } }, "+" + pr.delta),
            ),
          )),
        )),
      ),
    );
  }

  // ═══════════════════════════════════════════════════════════════════
  // DATA / SETTINGS
  // ═══════════════════════════════════════════════════════════════════
  function DataSettings({ state, dispatch, onPushToSheets, onPullFromSheets, onReset }) {
    const fileRef = useRef(null);
    const [status, setStatus] = useState("");
    const [resetConfirm, setResetConfirm] = useState(false);
    const [importError, setImportError] = useState(null);

    const doReset = async () => {
      setStatus("resetting");
      try { await onReset(); setStatus("reset-done"); setResetConfirm(false); setTimeout(()=>setStatus(""),2000); }
      catch(ex) { setStatus("reset-error"); console.warn("Reset:",ex); }
    };

    const exportData = () => {
      const data = { ...state }; delete data.activeView; delete data.trackingSession;
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob); const a = document.createElement("a");
      a.href = url; a.download = "workout-data-" + toDateStr(new Date()) + ".json"; a.click(); URL.revokeObjectURL(url);
    };
    const importData = ev => {
      const file = ev.target.files && ev.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.workouts && typeof data.workouts === "object" && !Array.isArray(data.workouts) && Array.isArray(data.history)) { dispatch({type:"IMPORT_STATE",state:data}); try{await sheetsService.saveAll(data)}catch(ex){} }
          else setImportError("This file doesn't look like a valid Workit backup. Expected 'workouts' (object) and 'history' (array).");
        } catch(ex) { setImportError("Could not parse the file as JSON. Please choose a valid Workit backup file."); }
      };
      reader.readAsText(file);
    };
    const push = async () => { setStatus("pushing"); try{await onPushToSheets();setStatus("push-done");setTimeout(()=>setStatus(""),2000);}catch(ex){setStatus("error");} };
    const pull = async () => { setStatus("pulling"); try{await onPullFromSheets();setStatus("pull-done");setTimeout(()=>setStatus(""),2000);}catch(ex){setStatus("error");} };

    return e("div", { className: "fade-in", style: { padding: 16, display: "flex", flexDirection: "column", gap: 16 } },
      importError && e(ConfirmModal, {
        message: importError,
        confirmLabel: "OK",
        onConfirm: () => setImportError(null),
        onCancel: () => setImportError(null),
      }),
      e("div", { className: "card", style: { display: "flex", flexDirection: "column", gap: 16 } },
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Google Sheets Sync"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Push sends your local data to the sheet. Pull loads the sheet data into the app."),
          e("div", { style: { display: "flex", gap: 8 } },
            e("button", { className: "btn btn-blue", style: { flex: 1 }, onClick: push, disabled: status==="pushing"||status==="pulling" },
              status==="pushing" ? "Pushing..." : status==="push-done" ? "Pushed!" : "Push to Sheet"),
            e("button", { className: "btn btn-dark", style: { flex: 1, border: "1px solid #3f3f46" }, onClick: pull, disabled: status==="pushing"||status==="pulling" },
              status==="pulling" ? "Pulling..." : status==="pull-done" ? "Pulled!" : "Pull from Sheet"),
          ),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Export JSON Backup"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Download all data as a local file."),
          e("button", { className: "btn btn-accent", style: { width: "100%" }, onClick: exportData }, "Export JSON"),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Import JSON"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Restore from a backup file."),
          e("input", { name: "importFile", type: "file", ref: fileRef, accept: ".json", onChange: importData, style: { display: "none" } }),
          e("button", { className: "btn btn-dark", style: { width: "100%" }, onClick: () => fileRef.current && fileRef.current.click() }, "Import JSON"),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4, color: "#ef4444" } }, "Reset Spreadsheet"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Clear all data from the Google Sheet and start fresh. All tracked history will be lost."),
          !resetConfirm
            ? e("button", { style: { width: "100%", padding: "10px 16px", borderRadius: 8, border: "1px solid #dc2626", background: "transparent", color: "#ef4444", fontSize: 14, fontWeight: 500, cursor: "pointer" }, onClick: () => setResetConfirm(true), disabled: status==="resetting" }, "Reset")
            : e("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
                e("p", { style: { fontSize: 13, color: "#ef4444", fontWeight: 500, textAlign: "center" } }, "Are you sure? This cannot be undone."),
                e("div", { style: { display: "flex", gap: 8 } },
                  e("button", { style: { flex: 1, padding: "10px 16px", borderRadius: 8, border: "none", background: "#dc2626", color: "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer" }, onClick: doReset, disabled: status==="resetting" },
                    status==="resetting" ? "Resetting..." : status==="reset-done" ? "Done!" : "Yes, Reset Everything"),
                  e("button", { style: { flex: 1, padding: "10px 16px", borderRadius: 8, border: "1px solid #3f3f46", background: "transparent", color: "#a1a1aa", fontSize: 14, cursor: "pointer" }, onClick: () => setResetConfirm(false) }, "Cancel"),
                ),
              ),
        ),
      ),
      e("div", { className: "card" },

  // ═══════════════════════════════════════════════════════════════════
  // MAIN APP
  // ═══════════════════════════════════════════════════════════════════
  function App() {
    // authState: "loading" | "login" | "ready" | "offline"
    // "offline" = has local data but no valid token, app is fully usable
    const [authState, setAuthState] = useState("loading");
    const [state, dispatch] = useReducer(reducer, null, makeInitialState);
    const [syncing, setSyncing] = useState(false);
    const [syncStatus, setSyncStatus] = useState(""); // "" | "synced" | "offline" | "error"
    const [lastSyncedAt, setLastSyncedAt] = useState(null); // Date object of last successful sync
    const [loadMsg, setLoadMsg] = useState("Loading...");
    const syncTimeout = useRef(null);
    const prevState = useRef(null);
    // stateRef always holds the latest state so callbacks (connectSheets) never close over a stale snapshot
    const stateRef = useRef(null);

    // ── 1. On mount: restore session (moved after connectSheets definition below)

    // ── 2. Save to localStorage on every state change
    //    Skip saving if we're on the login screen with empty state — prevents wiping good cached data
    useEffect(() => {
      if (authState === "loading") return;
      if (authState === "login" && Object.keys(state.workouts).length === 0 && state.history.length === 0) return;
      saveLocal(state);
    }, [state, authState]);

    // ── 2b. Keep stateRef current so async callbacks always read the latest state
    useEffect(() => { stateRef.current = state; }, [state]);

    // ── 3. Sync to Sheets (background, non-blocking, with token refresh on 401)
    const syncToSheets = useCallback(async (st) => {
      if(!sheetsService.accessToken||!sheetsService.spreadsheetId) { setSyncStatus("offline"); return; }
      setSyncing(true); setSyncStatus("");
      try{
        await sheetsService.saveAll(st);
        setSyncStatus("synced"); setLastSyncedAt(new Date());
      } catch(ex) {
        // If 401/403 (token expired), try silent re-auth and retry once
        if (ex.message && (ex.message.includes("401") || ex.message.includes("403") || ex.message.toLowerCase().includes("invalid")) && typeof google !== "undefined" && google.accounts) {
          try {
            const newToken = await new Promise((resolve, reject) => {
              const c = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
                callback: r => r.error ? reject(r) : resolve(r.access_token),
              });
              c.requestAccessToken({ prompt: "" });
            });
            sheetsService.accessToken = newToken;
            await sheetsService.saveAll(st);
            setSyncStatus("synced"); setLastSyncedAt(new Date());
          } catch(retryEx) { console.warn("Sync retry failed:", retryEx); setSyncStatus("error"); }
        } else {
          console.warn("Sync:", ex); setSyncStatus("error");
        }
      }
      finally{ setSyncing(false); }
    }, []);

    // ── 4a. Refs for auto-reconnect (effect is after connectSheets below)
    // (prevHistory/prevWeightLog refs removed — replaced by prevDataHash in effect 5a)

    // ── 4b. Debounced sync on state changes (only when authenticated)
    // 500ms for config changes (schedule, workouts), 2000ms during active tracking
    // Uses _quickHash (module-level) rather than full JSON.stringify for change detection —
    // the actual state object is passed to syncToSheets which serializes it once for the API call.
    useEffect(() => {
      if(authState !== "ready") return;
      if(prevState.current){
        var curHash = _quickHash(JSON.stringify(state.history)) + "|" + _quickHash(JSON.stringify(state.workouts)) + "|" + _quickHash(JSON.stringify(state.weightLog)) + "|" + _quickHash(JSON.stringify(state.weeklySchedule)) + "|" + _quickHash(JSON.stringify(state.cadenceSchedule)) + "|" + state.scheduleType;
        var {activeView:_a, trackingSession:_t, ...prev} = prevState.current;
        var prevHash = _quickHash(JSON.stringify(prev.history)) + "|" + _quickHash(JSON.stringify(prev.workouts)) + "|" + _quickHash(JSON.stringify(prev.weightLog)) + "|" + _quickHash(JSON.stringify(prev.weeklySchedule)) + "|" + _quickHash(JSON.stringify(prev.cadenceSchedule)) + "|" + prev.scheduleType;
        if(curHash === prevHash) return;
      }
      prevState.current=state;
      if(syncTimeout.current)clearTimeout(syncTimeout.current);
      const delay = state.trackingSession ? 2000 : 500;
      syncTimeout.current=setTimeout(()=>syncToSheets(stateRef.current),delay);
    }, [state, authState, syncToSheets]);

    // ── 5. Connect to Sheets (shared by login + reconnect)
    // fromOffline=true means user was working offline and made changes → push local first, then pull
    // fromOffline=false means fresh login → just pull from remote
    const connectSheets = useCallback(async (token, fromOffline) => {
      sheetsService.accessToken = token;
      try{
        let id=await sheetsService.findSpreadsheet();
        if(!id) id=await sheetsService.createSpreadsheet();
        sheetsService.spreadsheetId=id;
        if (fromOffline) {
          // Read the latest state via ref to avoid stale closure — stateRef is always current
          await sheetsService.saveAll(stateRef.current);
        }
        // Always pull from remote to ensure React state is populated
        const remoteData=await sheetsService.loadAll();
        console.log("[WorkIt Sync] Loaded from Sheets:", {
          workouts: Object.keys(remoteData.workouts||{}).length,
          history: (remoteData.history||[]).length,
          weightLog: (remoteData.weightLog||[]).length,
          scheduleType: remoteData.scheduleType,
          weeklySchedule: remoteData.weeklySchedule,
          cadenceSchedule: remoteData.cadenceSchedule,
        });
        const wCount = Object.keys(remoteData.workouts||{}).length;
        const hCount = (remoteData.history||[]).length;
        dispatch({type:"LOAD_FROM_SHEETS",data:remoteData});
        prevState.current={...makeInitialState(),...remoteData};
        setAuthState("ready");
        setSyncStatus(wCount > 0 || hCount > 0 ? "synced" : "empty"); setLastSyncedAt(new Date());
        try{localStorage.setItem("workit_session","active")}catch(e){}
      }catch(ex){console.warn("Sheets connect:",ex); setSyncStatus("error"); setAuthState(loadLocal() ? "offline" : "login");}
    }, []); // stateRef is a ref — stable identity, no need in dep array

    // ── 1. On mount: restore session if user was active (signed in or mid-workout)
    //    Only explicit sign-out clears the session flag → sends to login.
    //    If session existed, go to "offline" with cached data — auto-reconnect
    //    (effect 5a) will re-auth on the next user interaction.
    useEffect(() => {
      var target = "login";
      try {
        const hadSession = localStorage.getItem("workit_session") === "active";
        const cached = loadLocal();
        if (hadSession && cached) {
          const { trackingSession, ...data } = cached;
          dispatch({type:"LOAD_FROM_SHEETS", data});
          if (trackingSession) dispatch({type:"START_TRACKING", session: trackingSession});
          prevState.current = { ...makeInitialState(), ...data };
          target = "offline";
        }
      } catch(ex) { console.warn("Session restore failed:", ex); }

      const check = setInterval(() => {
        if(typeof google!=="undefined"&&google.accounts){
          clearInterval(check); setAuthState(target);
          if (target === "offline") setSyncStatus("offline");
        }
      }, 200);
      const fb = setTimeout(() => { clearInterval(check); setAuthState(target); if (target === "offline") setSyncStatus("offline"); }, 3000);
      return () => { clearInterval(check); clearTimeout(fb); };
    }, []);

    // ── 5a. Auto-reconnect when ANY data changes while offline
    // Compute a single state hash (module-level _quickHash reused — no per-render allocation)
    const prevDataHash = useRef(null);
    useEffect(() => {
      var dataHash = _quickHash(JSON.stringify(state.history)) + "|" + _quickHash(JSON.stringify(state.weightLog)) + "|" + _quickHash(JSON.stringify(state.workouts)) + "|" + _quickHash(JSON.stringify(state.weeklySchedule)) + "|" + _quickHash(JSON.stringify(state.cadenceSchedule)) + "|" + state.scheduleType;
      if (prevDataHash.current === null) { prevDataHash.current = dataHash; return; }
      var changed = dataHash !== prevDataHash.current;
      prevDataHash.current = dataHash;
      if (changed && authState === "offline" && typeof google !== "undefined" && google.accounts) {
        try {
          setAuthState("loading"); setLoadMsg("Syncing...");
          var client = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
            callback: async function(resp) {
              if (!resp.error) { await connectSheets(resp.access_token, true); }
              else { setAuthState("offline"); }
            },
          });
          client.requestAccessToken({ prompt: "" });
        } catch(ex) { setAuthState("offline"); }
      }
    }, [state.history, state.weightLog, state.workouts, state.weeklySchedule, state.cadenceSchedule, state.scheduleType, authState, connectSheets]);

    // ── 6. Manual login (first time or re-auth)
    const handleLogin = useCallback(async (token) => {
      setAuthState("loading"); setLoadMsg("Connecting...");
      await connectSheets(token, false);
    }, [connectSheets]);

    // ── 7. Sign out — only way to get back to login screen
    const handleSignOut = useCallback(() => {
      var token=sheetsService.accessToken;
      sheetsService.accessToken=null;sheetsService.spreadsheetId=null;
      if(token){try{google.accounts.oauth2.revoke(token,()=>{})}catch(e){}}
      try{localStorage.removeItem("workit_session")}catch(e){}
      setAuthState("login"); setSyncStatus("");
    }, []);

    // ── 8. Reconnect handler (user-initiated, won't be blocked)
    const handleReconnect = useCallback(() => {
      try {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
          callback: async (resp) => {
            if (resp.error) { setSyncStatus("error"); return; }
            await connectSheets(resp.access_token, true);
          },
        });
        client.requestAccessToken();
      } catch(ex) { setSyncStatus("error"); }
    }, [connectSheets]);

    if(authState==="loading") return e(LoadingScreen, { message: loadMsg });
    if(authState==="login") return e(LoginScreen, { onLogin: handleLogin });

    return e(ErrorBoundary, null,
      e("div", { style: { minHeight: "100vh", background: "#18181b", color: "#fff", maxWidth: 480, margin: "0 auto" } },
        state.activeView === "tracking" && state.trackingSession
          ? e(ErrorBoundary, null, e(TrackingSession, { state, dispatch }))
          : [
            e(NavBar, { key: "nav", activeView: state.activeView, dispatch, isConnected: authState==="ready", onSignOut: handleSignOut, syncing, syncStatus, onReconnect: handleReconnect, lastSyncedAt }),
            e(ErrorBoundary, { key: "content" },
              e("div", { style: { paddingBottom: 80 } },
                state.activeView === "dashboard" && e(Dashboard, { state, dispatch }),
                state.activeView === "schedule" && e(ScheduleSetup, { state, dispatch, syncStatus, syncing }),
                state.activeView === "workouts" && e(WorkoutBuilder, { state, dispatch }),
                state.activeView === "analytics" && e(Analytics, { state }),
                state.activeView === "guide" && e(GuideTab),
                state.activeView === "settings" && e(DataSettings, { state, dispatch, onPushToSheets: () => syncToSheets(state), onPullFromSheets: async () => {
                  if(!sheetsService.accessToken||!sheetsService.spreadsheetId) throw new Error("Not connected");
                  const remoteData = await sheetsService.loadAll();
                  dispatch({type:"LOAD_FROM_SHEETS", data: remoteData});
                  prevState.current = {...makeInitialState(), ...remoteData};
                }, onReset: async () => {
                  if (sheetsService.accessToken && sheetsService.spreadsheetId) await sheetsService.resetSpreadsheet();
                  clearLocal();
                  dispatch({type:"IMPORT_STATE",state:makeInitialState()});
                }}),
              )
            ),
            e("div", { key: "footer", style: { borderTop: "1px solid #1f1f1f", padding: "16px 16px 24px", marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" } },
              e("span", { style: { fontSize: 11, color: "#2a2a2a", fontFamily: "monospace" } }, "harmant.app/workit"),
              e("span", { style: { fontSize: 11, color: "#2a2a2a", fontFamily: "monospace" } }, "v" + APP_VERSION),
            ),
          ]
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      // Show update banner when a new SW is waiting
      function showUpdateBanner() {
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#f97316;color:#fff;padding:12px 16px;text-align:center;font-size:14px;font-weight:600;z-index:9999;cursor:pointer;font-family:-apple-system,sans-serif';
        banner.textContent = 'New version available — tap to update';
        banner.onclick = function() { window.location.reload(); };
        document.body.appendChild(banner);
      }
      if (reg.waiting) showUpdateBanner();
      reg.addEventListener('updatefound', function() {
        var nw = reg.installing;
        nw.addEventListener('statechange', function() {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner();
        });
      });
      // Force SW update check when app is foregrounded (fixes iOS/Android snapshot restore)
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') reg.update();
      });
    });
    // Reload when new SW takes control
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      window.location.reload();
    });
  }
})();
</script>
