  const todayDay = () => DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const toDateStr = (d) => d.toISOString().split("T")[0];
  const effortColor = (v) => v<=3?"#4ade80":v<=6?"#facc15":v<=8?"#fb923c":"#ef4444";

  // ─── Local Storage ─────────────────────────────────────────────────
  function saveLocal(state) {
    try {
      const { activeView, trackingSession, ...data } = state;
      // Also save trackingSession so mid-workout progress is preserved
      const toSave = { ...data };
      if (trackingSession) toSave._trackingSession = trackingSession;
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(toSave));
    } catch(e) {}
  }
  function loadLocal() {
    try {
      const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      const session = data._trackingSession || null;
      delete data._trackingSession;
      return { ...data, trackingSession: session };
    } catch(e) { return null; }
  }
  function clearLocal() {
    try { localStorage.removeItem(LOCAL_STORAGE_KEY); } catch(e) {}
  }

  // ═══════════════════════════════════════════════════════════════════
  // SHEETS SERVICE
  // ═══════════════════════════════════════════════════════════════════
  const sheetsService = {
    accessToken: null,
    spreadsheetId: null,

    async _fetch(url, options) {
      options = options || {};
      const res = await fetch(url, { ...options, headers: { "Authorization": "Bearer " + this.accessToken, "Content-Type": "application/json", ...(options.headers||{}) } });
      if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error((err.error||{}).message || "API error " + res.status); }
      return res.json();
    },

    async findSpreadsheet() {
      const q = encodeURIComponent("name='" + SPREADSHEET_NAME + "' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false");
      const data = await this._fetch(DRIVE_API + "?q=" + q + "&spaces=drive&fields=files(id,name)");
      return (data.files||[])[0] ? data.files[0].id : null;
    },

    async createSpreadsheet() {
      const data = await this._fetch(SHEETS_API, { method: "POST", body: JSON.stringify({
        properties: { title: SPREADSHEET_NAME },
        sheets: [{properties:{title:"config",index:0}},{properties:{title:"history",index:1}},{properties:{title:"weight",index:2}}],
      })});
      this.spreadsheetId = data.spreadsheetId;
      await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values:batchUpdate", { method:"POST", body: JSON.stringify({ valueInputOption:"RAW", data:[
        {range:"config!A1:B1",values:[["key","value"]]},
        {range:"history!A1:G1",values:[["Date","Workout","Exercise","Set #","Reps","Weight (lbs)","Effort (1-10)"]]},
        {range:"weight!A1:B1",values:[["Date","Weight (lbs)"]]}
      ]})});
      return this.spreadsheetId;
    },

    async _getValues(range) {
      const d = await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range));
      return d.values || [];
    },

    async _clearAndWrite(range, values) {
      await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range)+":clear",{method:"POST",body:"{}"});
      if (values.length > 0) await this._fetch(SHEETS_API+"/"+this.spreadsheetId+"/values/"+encodeURIComponent(range)+"?valueInputOption=RAW",{method:"PUT",body:JSON.stringify({range,values})});
    },

    // ── Flatten history entries into rows: Date | Workout | Exercise | Set# | Reps | Weight | Effort
    _flattenHistory(history) {
      const rows = [["Date","Workout","Exercise","Set #","Reps","Weight (lbs)","Effort (1-10)"]];
      history.forEach(function(entry) {
        (entry.exercises||[]).forEach(function(ex) {
          (ex.sets||[]).forEach(function(set, si) {
            rows.push([entry.date, entry.workoutName||"Unknown", ex.name, si+1, set.reps, set.weight, set.effort]);
          });
        });
      });
      return rows;
    },

    // ── Parse flat history rows back into structured entries grouped by date+workout
    _parseHistory(rows) {
      const groups = {};
      rows.forEach(function(r) {
        if (!r[0] || r[0]==="Date") return;
        var key = r[0] + "|" + (r[1]||"");
        if (!groups[key]) groups[key] = { date: r[0], workoutId: null, workoutName: r[1]||"Unknown", wasOverride: false, exercises: {} };
        var exName = r[2]||"";
        if (!groups[key].exercises[exName]) groups[key].exercises[exName] = { exerciseId: exName, name: exName, sets: [] };
        groups[key].exercises[exName].sets.push({ reps: parseInt(r[4])||0, weight: parseFloat(r[5])||0, effort: parseInt(r[6])||5 });
      });
      return Object.values(groups).map(function(g) {
        return { date: g.date, workoutId: g.workoutId, workoutName: g.workoutName, wasOverride: g.wasOverride, exercises: Object.values(g.exercises) };
      });
    },

    async loadAll() {
      // Try reading all tabs, including legacy "workouts" tab for backward compat
      const [configRows, historyRows, weightRows] = await Promise.all([
        this._getValues("config!A2:B200"), this._getValues("history!A2:G50000"), this._getValues("weight!A2:B1000")
      ]);
      // Also try legacy workouts tab (old format had separate workouts sheet)
      let legacyWorkoutRows = [];
      try { legacyWorkoutRows = await this._getValues("workouts!A2:B1000"); } catch(e) {}

      const config = {};
      configRows.forEach(function(r){ try{config[r[0]]=JSON.parse(r[1])}catch(e){config[r[0]]=r[1]} });

      // Load workouts: prefer config.workouts, fall back to legacy workouts tab
      let workouts = config.workouts || {};
      if (Object.keys(workouts).length === 0 && legacyWorkoutRows.length > 0) {
        legacyWorkoutRows.forEach(function(r){ try{workouts[r[0]]=JSON.parse(r[1])}catch(e){} });
      }

      // Detect history format: old format has 2 columns (date, json), new has 7 columns
      let history;
      if (historyRows.length > 0 && historyRows[0].length <= 2) {
        // Legacy format: parse JSON blobs
        history = historyRows.map(function(r){ try{return JSON.parse(r[1])}catch(e){return null} }).filter(Boolean);
      } else {
        // New flat format
        history = this._parseHistory(historyRows);
      }

      // Restore workoutId references by matching workout names
      history.forEach(function(h) {
        if (!h.workoutId || !workouts[h.workoutId]) {
          Object.entries(workouts).forEach(function(e) { if (e[1].name === h.workoutName) h.workoutId = e[0]; });
        }
      });
      const weightLog = weightRows.map(function(r){ return {date:r[0],weight:parseFloat(r[1])} }).filter(function(w){return !isNaN(w.weight)});
      return {
        scheduleType: config.scheduleType || "weekly",
        weeklySchedule: config.weeklySchedule || DAYS.map(function(d){return{day:d,workoutId:null}}),
        cadenceSchedule: config.cadenceSchedule || {restMode:"manual",autoRestEvery:3,rotation:[],currentIndex:0},
        workouts: workouts, history: history, weightLog: weightLog,
      };
    },

    async resetSpreadsheet() {
      if (!this.spreadsheetId) return;
      await Promise.all([
        this._clearAndWrite("config!A1:B200", [["key","value"]]),
        this._clearAndWrite("history!A1:G50000", [["Date","Workout","Exercise","Set #","Reps","Weight (lbs)","Effort (1-10)"]]),
        this._clearAndWrite("weight!A1:B1000", [["Date","Weight (lbs)"]]),
      ]);
    },

    async saveAll(state) {
      const configVals = [["key","value"],
        ["scheduleType",JSON.stringify(state.scheduleType)],
        ["weeklySchedule",JSON.stringify(state.weeklySchedule)],
        ["cadenceSchedule",JSON.stringify(state.cadenceSchedule)],
        ["workouts",JSON.stringify(state.workouts)]
      ];
      const historyVals = this._flattenHistory(state.history);
      const weightVals = [["Date","Weight (lbs)"]].concat(state.weightLog.map(function(w){return[w.date,String(w.weight)]}));
      await Promise.all([
        this._clearAndWrite("config!A1:B200", configVals),
        this._clearAndWrite("history!A1:G50000", historyVals),
        this._clearAndWrite("weight!A1:B1000", weightVals),
      ]);
    },
  };

  // ─── State ──────────────────────────────────────────────────────
  const makeInitialState = () => ({
    scheduleType: "weekly",
    weeklySchedule: DAYS.map(d => ({ day: d, workoutId: null })),
    cadenceSchedule: { restMode: "manual", autoRestEvery: 3, rotation: [], currentIndex: 0 },
    workouts: {}, history: [], weightLog: [],
    activeView: "dashboard", trackingSession: null,
  });

  function reducer(state, action) {
    switch (action.type) {
      case "SET_VIEW": return { ...state, activeView: action.view };
      case "SET_SCHEDULE_TYPE": return { ...state, scheduleType: action.scheduleType };
      case "SET_WEEKLY_SCHEDULE": return { ...state, weeklySchedule: action.schedule };
      case "SET_CADENCE_SCHEDULE": return { ...state, cadenceSchedule: { ...state.cadenceSchedule, ...action.data } };
      case "UPSERT_WORKOUT": { const id = action.workout.id || uid(); return { ...state, workouts: { ...state.workouts, [id]: { ...action.workout, id } } }; }
      case "DELETE_WORKOUT": {
        const w = { ...state.workouts }; delete w[action.id];
        return { ...state, workouts: w,
          weeklySchedule: state.weeklySchedule.map(d => d.workoutId === action.id ? { ...d, workoutId: null } : d),
          cadenceSchedule: { ...state.cadenceSchedule, rotation: state.cadenceSchedule.rotation.filter(r => r.workoutId !== action.id) },
        };
      }
      case "START_TRACKING": return { ...state, trackingSession: action.session, activeView: "tracking" };
      case "UPDATE_TRACKING": return { ...state, trackingSession: { ...state.trackingSession, ...action.data } };
      case "SAVE_WORKOUT": {
        const s = state.trackingSession;
        const entry = { date: toDateStr(new Date()), workoutId: s.workoutId, workoutName: (state.workouts[s.workoutId]||{}).name||"Unknown", wasOverride: s.wasOverride||false, exercises: s.exercises };
        let cad = state.cadenceSchedule;
        if (state.scheduleType === "cadence" && cad.rotation.length > 0) cad = { ...cad, currentIndex: (cad.currentIndex + 1) % cad.rotation.length };
        return { ...state, history: [...state.history, entry], cadenceSchedule: cad, trackingSession: null, activeView: "dashboard" };
      }
      case "CANCEL_TRACKING": return { ...state, trackingSession: null, activeView: "dashboard" };
      case "OVERRIDE_TODAY": {
        if (state.scheduleType === "weekly") {
          const ti = state.weeklySchedule.findIndex(d => d.day === todayDay());
          const oi = state.weeklySchedule.findIndex(d => d.workoutId === action.newWorkoutId);
          if (ti >= 0 && oi >= 0) { const sc = [...state.weeklySchedule]; const tmp = sc[ti].workoutId; sc[ti]={...sc[ti],workoutId:action.newWorkoutId}; sc[oi]={...sc[oi],workoutId:tmp}; return{...state,weeklySchedule:sc}; }
        } else {
          const idx = state.cadenceSchedule.rotation.findIndex(r => r.workoutId === action.newWorkoutId);
          if (idx >= 0) return { ...state, cadenceSchedule: { ...state.cadenceSchedule, currentIndex: idx } };
        }
        return state;
      }
      case "LOG_WEIGHT": return { ...state, weightLog: [...state.weightLog.filter(w => w.date !== action.date), { date: action.date, weight: action.weight }].sort((a,b)=>a.date.localeCompare(b.date)) };
      case "LOAD_FROM_SHEETS": return { ...state, ...action.data };
      case "IMPORT_STATE": return { ...action.state, activeView: "dashboard", trackingSession: null };
      default: return state;
    }
  }

  // ═══════════════════════════════════════════════════════════════════
  // MINI CHART (SVG-based, no external dependency)
  // ═══════════════════════════════════════════════════════════════════
  function MiniLineChart({ data, dataKey, width, height, color, label }) {
    if (!data || data.length < 2) return e("p", { style: { color: "#71717a", fontSize: 12, textAlign: "center", padding: "24px 0" } }, "Not enough data yet");
    const vals = data.map(d => d[dataKey]);
    const min = Math.min(...vals); const max = Math.max(...vals);
    const range = max - min || 1;
    const w = width || 320; const h = height || 150;
    const pad = 40;
    const points = data.map((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - ((d[dataKey] - min) / range) * (h - pad * 2);
      return { x, y, ...d };
    });
    const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");
    return e("div", { style: { overflowX: "auto" } },
      e("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h, style: { display: "block", margin: "0 auto" } },
        // Grid lines
        [0, 0.25, 0.5, 0.75, 1].map((f, i) => {
          const y = h - pad - f * (h - pad * 2);
          const val = (min + f * range).toFixed(0);
          return e("g", { key: i },
            e("line", { x1: pad, y1: y, x2: w - pad, y2: y, stroke: "#3f3f46", strokeDasharray: "3,3" }),
            e("text", { x: pad - 4, y: y + 4, textAnchor: "end", fill: "#71717a", fontSize: 9 }, val),
          );
        }),
        // X labels
        data.length <= 12 ? points.map((p, i) =>
          e("text", { key: "x" + i, x: p.x, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 9 }, p.date)
        ) : [0, Math.floor(data.length/2), data.length-1].map(i =>
          e("text", { key: "x" + i, x: points[i].x, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 9 }, points[i].date)
        ),
        // Line
        e("path", { d: pathD, fill: "none", stroke: color || "#f97316", strokeWidth: 2 }),
        // Dots
        points.map((p, i) => e("circle", { key: i, cx: p.x, cy: p.y, r: 3, fill: color || "#f97316" })),
        // Label
        label && e("text", { x: w/2, y: 12, textAnchor: "middle", fill: "#a1a1aa", fontSize: 10 }, label),
      )
    );
  }

  function MiniBarChart({ data, dataKey, width, height, color, label }) {
    if (!data || data.length === 0) return e("p", { style: { color: "#71717a", fontSize: 12, textAlign: "center", padding: "24px 0" } }, "No data");
    const vals = data.map(d => d[dataKey]);
    const max = Math.max(...vals) || 1;
    const w = width || 320; const h = height || 150;
    const pad = 40;
    const barW = Math.max(8, Math.min(24, (w - pad * 2) / data.length - 2));
    return e("div", { style: { overflowX: "auto" } },
      e("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h, style: { display: "block", margin: "0 auto" } },
        // Y axis labels
        [0, 0.5, 1].map((f, i) => {
          const y = h - pad - f * (h - pad * 2);
          return e("g", { key: i },
            e("line", { x1: pad, y1: y, x2: w - pad, y2: y, stroke: "#3f3f46", strokeDasharray: "3,3" }),
            e("text", { x: pad - 4, y: y + 4, textAnchor: "end", fill: "#71717a", fontSize: 9 }, (f * max).toFixed(0)),
          );
        }),
        // Bars
        data.map((d, i) => {
          const barH = (d[dataKey] / max) * (h - pad * 2);
          const x = pad + (i / data.length) * (w - pad * 2) + (w - pad * 2) / data.length / 2 - barW / 2;
          const y = h - pad - barH;
          return e("g", { key: i },
            e("rect", { x: x, y: y, width: barW, height: barH, fill: color || "#f97316", rx: 3 }),
            data.length <= 12 && e("text", { x: x + barW / 2, y: h - pad + 14, textAnchor: "middle", fill: "#71717a", fontSize: 8 }, d.date),
          );
        }),
        label && e("text", { x: w / 2, y: 12, textAnchor: "middle", fill: "#a1a1aa", fontSize: 10 }, label),
      )
    );
  }

  function ScheduleSetup({ state, dispatch }) {
    const wl = Object.values(state.workouts);
    const setSlot = (day, wid) => dispatch({type:"SET_WEEKLY_SCHEDULE",schedule:state.weeklySchedule.map(s=>s.day===day?{...s,workoutId:wid}:s)});
    const addRot = wid => dispatch({type:"SET_CADENCE_SCHEDULE",data:{rotation:[...state.cadenceSchedule.rotation,{workoutId:wid}]}});
    const remRot = i => dispatch({type:"SET_CADENCE_SCHEDULE",data:{rotation:state.cadenceSchedule.rotation.filter((_,idx)=>idx!==i)}});
    const moveRot = (i,dir) => {const r=[...state.cadenceSchedule.rotation];const n=i+dir;if(n<0||n>=r.length)return;[r[i],r[n]]=[r[n],r[i]];dispatch({type:"SET_CADENCE_SCHEDULE",data:{rotation:r}});};

    if (wl.length === 0) return e("div", { className: "fade-in", style: { padding: 16 } },

        ["weekly","cadence"].map(t => e("button", { key: t, style: { flex: 1, padding: "8px 0", borderRadius: 6, border: "none", fontSize: 14, fontWeight: 500, cursor: "pointer", background: state.scheduleType===t?"#f97316":"transparent", color: state.scheduleType===t?"#fff":"#a1a1aa" }, onClick: () => dispatch({type:"SET_SCHEDULE_TYPE",scheduleType:t}) }, t === "weekly" ? "Weekly" : "Cadence / Split"))
      ),
      state.scheduleType === "weekly"
        ? e("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
          e("p", { className: "text-muted", style: { fontSize: 13 } }, "Assign a workout to each day. Leave empty for rest."),
          state.weeklySchedule.map(slot => e("div", { key: slot.day, style: { display: "flex", alignItems: "center", gap: 12, background: "#27272a", borderRadius: 8, padding: 12 } },
            e("div", { style: { width: 40, fontSize: 14, fontWeight: 500, color: "#d4d4d8" } }, DAY_LABELS[slot.day]),

        : e("div", { style: { display: "flex", flexDirection: "column", gap: 16 } },

          e("div", { className: "card" },
            e("div", { className: "label" }, "Rest Day Mode"),
            e("div", { style: { display: "flex", gap: 8 } },
              ["manual","auto"].map(m => e("button", { key: m, style: { flex: 1, padding: "8px 0", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 500, cursor: "pointer", background: state.cadenceSchedule.restMode===m?"#f97316":"#3f3f46", color: state.cadenceSchedule.restMode===m?"#fff":"#a1a1aa" }, onClick: () => dispatch({type:"SET_CADENCE_SCHEDULE",data:{restMode:m}}) }, m==="manual"?"Manual Placement":"Auto Every N Days"))
            ),
            state.cadenceSchedule.restMode === "auto" && e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginTop: 12 } },
              e("span", { style: { fontSize: 13, color: "#d4d4d8" } }, "Rest every"),

              e("span", { style: { fontSize: 13, color: "#d4d4d8" } }, "workout days"),
            ),

          // Rotation
          e("div", { className: "card" },
            e("div", { className: "label" }, "Split Order"),
            state.cadenceSchedule.rotation.length === 0 && e("p", { className: "text-muted", style: { fontSize: 13, marginBottom: 12 } }, "No items yet."),

  // ═══════════════════════════════════════════════════════════════════
  // TRACKING SESSION
  // ═══════════════════════════════════════════════════════════════════
  function TrackingSession({ state, dispatch }) {
    const s = state.trackingSession; if (!s) return null;
    const w = state.workouts[s.workoutId];
    const [showSwap, setShowSwap] = useState(null);

    const updSet = (ei, si, f, v) => {
      const exs = s.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((st,j)=>j!==si?st:{...st,[f]:v})});
      dispatch({type:"UPDATE_TRACKING",data:{exercises:exs}});
    };
    const addSet = ei => {
      const exs = s.exercises.map((ex,i)=>{if(i!==ei)return ex;const last=ex.sets[ex.sets.length-1]||{reps:10,weight:0,effort:5};return{...ex,sets:[...ex.sets,{...last}]};});
      dispatch({type:"UPDATE_TRACKING",data:{exercises:exs}});
    };
    const remSet = (ei,si) => {
      const exs = s.exercises.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.filter((_,j)=>j!==si)});
      dispatch({type:"UPDATE_TRACKING",data:{exercises:exs}});
    };
    const swap = (ei,nm) => {
      const exs = s.exercises.map((ex,i)=>i!==ei?ex:{...ex,name:nm,exerciseId:uid()});
      dispatch({type:"UPDATE_TRACKING",data:{exercises:exs}}); setShowSwap(null);
    };
    const getAlts = ei => (w && w.exercises[ei]) ? w.exercises[ei].alternatives || [] : [];

    return e("div", { className: "fade-in", style: { padding: 16, display: "flex", flexDirection: "column", gap: 16 } },
      e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
        e("div", null,
          e("h2", { style: { fontSize: 20, fontWeight: 700, margin: 0 } }, (w||{}).name || "Workout"),
          s.wasOverride && e("span", { style: { fontSize: 12, color: "#f97316" } }, "Override"),
        ),
        e("button", { style: { background:"none",border:"none",color:"#a1a1aa",cursor:"pointer",fontSize:13 }, onClick: ()=>dispatch({type:"CANCEL_TRACKING"}) }, "Cancel"),
      ),
      s.exercises.map((ex, ei) => e("div", { key: ex.exerciseId+ei, className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 12 } },
          e("div", { style: { fontWeight: 600 } }, ex.name),
          e("button", { style: { background:"none",border:"none",color:"#f97316",cursor:"pointer",fontSize:12 }, onClick: ()=>setShowSwap(showSwap===ei?null:ei) }, "Swap"),
        ),
        showSwap === ei && e("div", { style: { background: "#3f3f46", borderRadius: 8, padding: 12, marginBottom: 12 } },
          e("div", { style: { fontSize: 11, color: "#a1a1aa", marginBottom: 8 } }, "Alternatives:"),
          getAlts(ei).length > 0
            ? getAlts(ei).map(alt => e("button", { key: alt, style: { display: "block", width: "100%", textAlign: "left", padding: "6px 8px", borderRadius: 4, border: "none", background: "transparent", color: "#e4e4e7", fontSize: 13, cursor: "pointer" }, onClick: ()=>swap(ei,alt) }, alt))
            : e("p", { style: { fontSize: 12, color: "#52525b" } }, "No alternatives defined."),
        ),
        // Header row
        e("div", { style: { display: "grid", gridTemplateColumns: "24px 1fr 70px 1fr 24px", gap: 4, marginBottom: 4 } },
          e("div", { style: { fontSize: 10, color: "#71717a" } }, "#"),
          e("div", { style: { fontSize: 10, color: "#71717a" } }, "Weight"),
          e("div", { style: { fontSize: 10, color: "#71717a" } }, "Reps"),
          e("div", { style: { fontSize: 10, color: "#71717a" } }, "Effort"),
          e("div"),
        ),
        ex.sets.map((set, si) => e("div", { key: si, style: { display: "grid", gridTemplateColumns: "24px 1fr 70px 1fr 24px", gap: 4, alignItems: "center", marginBottom: 4 } },
          e("div", { style: { fontSize: 12, color: "#71717a" } }, si+1),
          e("input", { type: "number", min: 0, step: 2.5, value: set.weight, onInput: ev => updSet(ei,si,"weight",parseFloat(ev.target.value)||0), className: "input input-sm", style: { width: "100%" } }),
          e("input", { type: "number", min: 0, value: set.reps, onInput: ev => updSet(ei,si,"reps",parseInt(ev.target.value)||0), className: "input input-sm", style: { width: "100%" } }),
          e("div", { className: "effort-bar" },
            e("input", { type: "range", min: 1, max: 10, value: set.effort, onInput: ev => updSet(ei,si,"effort",parseInt(ev.target.value)) }),
            e("span", { style: { fontSize: 11, fontFamily: "monospace", color: effortColor(set.effort), minWidth: 16, textAlign: "right" } }, set.effort),
          ),
          e("button", { onClick: ()=>remSet(ei,si), style: { background:"none",border:"none",color:"#52525b",cursor:"pointer",fontSize:12 } }, "✕"),
        )),
        e("button", { className: "btn btn-ghost", style: { width: "100%", fontSize: 12, padding: 6, marginTop: 4 }, onClick: ()=>addSet(ei) }, "+ Add Set"),
      )),
      e("button", { className: "btn btn-green", style: { width: "100%", padding: 14, fontSize: 16 }, onClick: ()=>dispatch({type:"SAVE_WORKOUT"}) }, "Save Workout"),
    );
  }

  // ═══════════════════════════════════════════════════════════════════
  // ANALYTICS
  // ═══════════════════════════════════════════════════════════════════
  function Analytics({ state }) {
    const [selEx, setSelEx] = useState("");
    const [selW, setSelW] = useState("");
    const allEx = useMemo(()=>{const n=new Set();state.history.forEach(h=>h.exercises.forEach(x=>n.add(x.name)));return[...n].sort();},[state.history]);
    const allWN = useMemo(()=>{const n=new Set();state.history.forEach(h=>n.add(h.workoutName));return[...n].sort();},[state.history]);

    const exTrend = useMemo(()=>{
      if(!selEx)return[];
      return state.history.filter(h=>h.exercises.some(x=>x.name===selEx)).map(h=>{
        const x=h.exercises.find(ex=>ex.name===selEx);
        return{date:h.date.slice(5),maxWeight:Math.max(...x.sets.map(s=>s.weight)),totalReps:x.sets.reduce((a,s)=>a+s.reps,0),avgEffort:Math.round(x.sets.reduce((a,s)=>a+s.effort,0)/x.sets.length*10)/10};
      });
    },[selEx,state.history]);

    const volTrend = useMemo(()=>{
      return(selW?state.history.filter(h=>h.workoutName===selW):state.history).map(h=>({date:h.date.slice(5),volume:h.exercises.reduce((a,x)=>a+x.sets.reduce((b,s)=>b+s.reps*s.weight,0),0)}));
    },[selW,state.history]);

    const weightData = state.weightLog.map(w => ({ date: w.date.slice(5), weight: w.weight }));

    const prs = useMemo(()=>{
      const r={};state.history.forEach(h=>h.exercises.forEach(x=>x.sets.forEach(s=>{if(!r[x.name]||s.weight>r[x.name].weight)r[x.name]={weight:s.weight,reps:s.reps,date:h.date};})));
      return Object.entries(r).filter(([,v])=>v.weight>0).sort((a,b)=>b[1].weight-a[1].weight);
    },[state.history]);

    if (state.history.length === 0) return e("div", { style: { padding: 16 } },
      e("h2", { style: { fontSize: 20, fontWeight: 700, marginBottom: 16 } }, "Analytics"),
      e("div", { className: "card", style: { textAlign: "center", padding: 32 } }, e("p", { className: "text-muted" }, "No data yet. Start tracking!"))
    );

    return e("div", { className: "fade-in", style: { padding: 16, display: "flex", flexDirection: "column", gap: 16 } },
      e("h2", { style: { fontSize: 20, fontWeight: 700 } }, "Analytics"),
      // Body weight
      weightData.length > 1 && e("div", { className: "card" },
        e("div", { className: "label" }, "Body Weight Trend"),
        e(MiniLineChart, { data: weightData, dataKey: "weight", color: "#f97316", width: 340, height: 160 }),
      ),
      // Volume
      e("div", { className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
          e("div", { className: "label", style: { margin: 0 } }, "Volume Trend"),
          e("select", { value: selW, onChange: ev => setSelW(ev.target.value), style: { fontSize: 12 } },
            e("option", { value: "" }, "All Workouts"),
            allWN.map(n => e("option", { key: n, value: n }, n)),
          ),
        ),
        e(MiniBarChart, { data: volTrend, dataKey: "volume", color: "#f97316", width: 340, height: 160 }),
      ),
      // Exercise progress
      e("div", { className: "card" },
        e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
          e("div", { className: "label", style: { margin: 0 } }, "Exercise Progress"),
          e("select", { value: selEx, onChange: ev => setSelEx(ev.target.value), style: { fontSize: 12 } },
            e("option", { value: "" }, "Select exercise..."),
            allEx.map(n => e("option", { key: n, value: n }, n)),
          ),
        ),
        selEx ? e(MiniLineChart, { data: exTrend, dataKey: "maxWeight", color: "#f97316", width: 340, height: 160, label: "Max Weight" }) :
          e("p", { style: { color: "#52525b", fontSize: 13, textAlign: "center", padding: "24px 0" } }, "Select an exercise to see trends"),
      ),
      // PRs
      prs.length > 0 && e("div", { className: "card" },
        e("div", { className: "label" }, "Personal Records"),
        prs.slice(0, 10).map(([name, pr]) => e("div", { key: name, style: { display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(63,63,70,0.5)", borderRadius: 8, padding: "8px 12px", marginBottom: 6 } },
          e("span", { style: { fontSize: 13, color: "#e4e4e7" } }, name),
          e("div", { style: { textAlign: "right" } },
            e("span", { style: { fontSize: 13, fontWeight: 600, color: "#f97316" } }, pr.weight + " lbs"),
            e("span", { style: { fontSize: 11, color: "#71717a", marginLeft: 4 } }, "× " + pr.reps),
            e("div", { style: { fontSize: 11, color: "#52525b" } }, pr.date),
          ),
        )),
      ),
    );
  }

  // DATA / SETTINGS
  // ═══════════════════════════════════════════════════════════════════
  function DataSettings({ state, dispatch, onForceSync, onReset }) {
    const fileRef = useRef(null);
    const [status, setStatus] = useState("");
    const [resetConfirm, setResetConfirm] = useState(false);

    const doReset = async () => {
      setStatus("resetting");
      try { await onReset(); setStatus("reset-done"); setResetConfirm(false); setTimeout(()=>setStatus(""),2000); }
      catch(ex) { setStatus("reset-error"); console.warn("Reset:",ex); }
    };

    const exportData = () => {
      const data = { ...state }; delete data.activeView; delete data.trackingSession;
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob); const a = document.createElement("a");
      a.href = url; a.download = "workout-data-" + toDateStr(new Date()) + ".json"; a.click(); URL.revokeObjectURL(url);
    };
    const importData = ev => {
      const file = ev.target.files && ev.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.workouts && data.history !== undefined) { dispatch({type:"IMPORT_STATE",state:data}); try{await sheetsService.saveAll(data)}catch(ex){} }
          else alert("Invalid file.");
        } catch(ex) { alert("Failed to parse JSON."); }
      };
      reader.readAsText(file);
    };
    const sync = async () => { setStatus("syncing"); try{await onForceSync();setStatus("done");setTimeout(()=>setStatus(""),2000);}catch(ex){setStatus("error");} };

    return e("div", { className: "fade-in", style: { padding: 16, display: "flex", flexDirection: "column", gap: 16 } },
      e("h2", { style: { fontSize: 20, fontWeight: 700 } }, "Data Management"),
      e("div", { className: "card", style: { display: "flex", flexDirection: "column", gap: 16 } },
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Sync to Google Sheets"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Force a full sync of all data."),
          e("button", { className: "btn btn-blue", style: { width: "100%" }, onClick: sync, disabled: status==="syncing" },
            status==="syncing" ? "Syncing..." : status==="done" ? "Synced!" : "Sync Now"),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Export JSON Backup"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Download all data as a local file."),
          e("button", { className: "btn btn-accent", style: { width: "100%" }, onClick: exportData }, "Export JSON"),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4 } }, "Import JSON"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Restore from a backup file."),
          e("input", { type: "file", ref: fileRef, accept: ".json", onChange: importData, style: { display: "none" } }),
          e("button", { className: "btn btn-dark", style: { width: "100%" }, onClick: () => fileRef.current && fileRef.current.click() }, "Import JSON"),
        ),
        e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
        e("div", null,
          e("div", { style: { fontSize: 14, fontWeight: 500, marginBottom: 4, color: "#ef4444" } }, "Reset Spreadsheet"),
          e("p", { className: "text-muted", style: { fontSize: 12, marginBottom: 12 } }, "Clear all data from the Google Sheet and start fresh. All tracked history will be lost."),
          !resetConfirm
            ? e("button", { style: { width: "100%", padding: "10px 16px", borderRadius: 8, border: "1px solid #dc2626", background: "transparent", color: "#ef4444", fontSize: 14, fontWeight: 500, cursor: "pointer" }, onClick: () => setResetConfirm(true), disabled: status==="resetting" }, "Reset")
            : e("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
                e("p", { style: { fontSize: 13, color: "#ef4444", fontWeight: 500, textAlign: "center" } }, "Are you sure? This cannot be undone."),
                e("div", { style: { display: "flex", gap: 8 } },
                  e("button", { style: { flex: 1, padding: "10px 16px", borderRadius: 8, border: "none", background: "#dc2626", color: "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer" }, onClick: doReset, disabled: status==="resetting" },

        e("div", { className: "label" }, "Install as App"),
        e("div", { style: { fontSize: 12, color: "#a1a1aa", lineHeight: 1.5, marginBottom: 12 } }, "Add Workit to your phone's home screen for a full-screen, app-like experience with no browser bar."),
        e("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
          e("div", null,
            e("div", { style: { fontSize: 13, fontWeight: 600, color: "#e4e4e7", marginBottom: 4 } }, "iPhone / iPad (Safari)"),
            e("div", { style: { fontSize: 11, color: "#71717a", lineHeight: 1.6 } },
              "1. Open harmant.app/workit in Safari", e("br"),
              "2. Tap the Share button (square with arrow)", e("br"),
              "3. Scroll down and tap \"Add to Home Screen\"", e("br"),
              "4. Tap \"Add\" \u2014 done!"),
          ),
          e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
          e("div", null,
            e("div", { style: { fontSize: 13, fontWeight: 600, color: "#e4e4e7", marginBottom: 4 } }, "Android (Chrome)"),
            e("div", { style: { fontSize: 11, color: "#71717a", lineHeight: 1.6 } },
              "1. Open harmant.app/workit in Chrome", e("br"),
              "2. Tap the three-dot menu (\u22EE) in the top right", e("br"),
              "3. Tap \"Add to Home screen\" or \"Install app\"", e("br"),
              "4. Tap \"Add\" \u2014 done!"),
          ),
          e("hr", { style: { border: "none", borderTop: "1px solid #3f3f46" } }),
          e("div", null,
            e("div", { style: { fontSize: 13, fontWeight: 600, color: "#e4e4e7", marginBottom: 4 } }, "Share with friends"),
            e("div", { style: { fontSize: 11, color: "#71717a", lineHeight: 1.6 } },
              "Just share the link: harmant.app/workit \u2014 anyone can use it for free. Each person's data stays in their own Google Sheet."),
          ),
        ),
      ),
      // ── About ──
      e("div", { className: "card", style: { textAlign: "center" } },
        e("div", { style: { fontSize: 24, marginBottom: 4 } }, "\uD83C\uDFCB\uFE0F"),
        e("div", { style: { fontSize: 16, fontWeight: 700, marginBottom: 2 } }, "Workit"),
        e("div", { className: "text-muted", style: { fontSize: 13, marginBottom: 8 } }, "v" + APP_VERSION + " \u00B7 " + APP_BUILD_DATE),
        e("div", { className: "text-muted", style: { fontSize: 11 } }, "Track workouts, reps, weight & progress"),
        e("div", { className: "text-muted", style: { fontSize: 11, marginTop: 4 } }, "harmant.app/workit"),
      ),
    );
  }

  // ═══════════════════════════════════════════════════════════════════
  // MAIN APP
  // ═══════════════════════════════════════════════════════════════════
  function App() {
    // authState: "loading" | "login" | "ready" | "offline"
    // "offline" = has local data but no valid token, app is fully usable
    const [authState, setAuthState] = useState("loading");
    const [user, setUser] = useState(null);
    const [state, dispatch] = useReducer(reducer, null, makeInitialState);
    const [syncing, setSyncing] = useState(false);
    const [syncStatus, setSyncStatus] = useState(""); // "" | "synced" | "offline" | "error"
    const [loadMsg, setLoadMsg] = useState("Loading...");
    const syncTimeout = useRef(null);
    const prevState = useRef(null);

    // ── 1. On mount: load from localStorage instantly, then try Google auth
    useEffect(() => {
      const cached = loadLocal();
      if (cached) {
        const { trackingSession, ...data } = cached;
        dispatch({type:"LOAD_FROM_SHEETS", data});
        if (trackingSession) dispatch({type:"START_TRACKING", session: trackingSession});
        prevState.current = { ...makeInitialState(), ...data };
      }
      // Wait for Google Identity Services to load, then decide initial state
      const check = setInterval(() => {
        if(typeof google!=="undefined"&&google.accounts){
          clearInterval(check);
          if (cached) setAuthState("offline");
          else setAuthState("login");
        }
      }, 200);
      const fb = setTimeout(() => {
        clearInterval(check);
        if (cached) setAuthState("offline");
        else setAuthState("login");
      }, 3000);
      return () => { clearInterval(check); clearTimeout(fb); };
    }, []);

    // ── 2. Save to localStorage on every state change
    useEffect(() => {
      if (authState === "loading") return;
      saveLocal(state);
    }, [state, authState]);

    // ── 3. Sync to Sheets (background, non-blocking)
    const syncToSheets = useCallback(async (st) => {
      if(!sheetsService.accessToken||!sheetsService.spreadsheetId) { setSyncStatus("offline"); return; }
      setSyncing(true); setSyncStatus("");
      try{ await sheetsService.saveAll(st); setSyncStatus("synced"); }
      catch(ex){ console.warn("Sync:",ex); setSyncStatus("error"); }
      finally{ setSyncing(false); }
    }, []);

    // ── 4. Debounced sync on state changes (only when authenticated)
    useEffect(() => {
      if(authState !== "ready") return;
      const{activeView,trackingSession,...cur}=state;
      if(prevState.current){const{activeView:_,trackingSession:__,...prev}=prevState.current;if(JSON.stringify(cur)===JSON.stringify(prev))return;}
      prevState.current=state;
      if(syncTimeout.current)clearTimeout(syncTimeout.current);
      syncTimeout.current=setTimeout(()=>syncToSheets(state),2000);
    }, [state, authState, syncToSheets]);

    // ── 5. Connect to Sheets (shared by login + reconnect)
    const connectSheets = useCallback(async (token) => {
      sheetsService.accessToken = token;
      try{const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+token}});if(r.ok)setUser(await r.json());}catch(ex){}
      try{
        let id=await sheetsService.findSpreadsheet();
        if(!id) id=await sheetsService.createSpreadsheet();
        sheetsService.spreadsheetId=id;
        // Merge: load from Sheets, but don't overwrite local data if it's newer
        const remoteData=await sheetsService.loadAll();
        const localData = loadLocal();
        // If local has more history entries, prefer local (user was tracking offline)
        if (localData && localData.history && localData.history.length > (remoteData.history||[]).length) {
          // Local is ahead — push local to sheets
          const pushState = { ...makeInitialState(), ...localData };
          await sheetsService.saveAll(pushState);
        } else {
          // Remote is same or ahead — load remote
          dispatch({type:"LOAD_FROM_SHEETS",data:remoteData});
          prevState.current={...makeInitialState(),...remoteData};
        }
        setAuthState("ready"); setSyncStatus("synced");
      }catch(ex){console.warn("Sheets connect:",ex); setSyncStatus("error"); setAuthState(loadLocal() ? "offline" : "login");}
    }, []);

    // ── 6. Manual login (first time or re-auth)
    const handleLogin = useCallback(async (token) => {
      setAuthState("loading"); setLoadMsg("Connecting...");
      await connectSheets(token);
    }, [connectSheets]);

    // ── 7. Sign out
    const handleSignOut = useCallback(() => {
      if(sheetsService.accessToken)try{google.accounts.oauth2.revoke(sheetsService.accessToken)}catch(ex){}
      sheetsService.accessToken=null;sheetsService.spreadsheetId=null;setUser(null);
      // Don't clear local data — keep it available offline
      setAuthState("offline"); setSyncStatus("offline");
    }, []);

    // ── 8. Reconnect handler (user-initiated, won't be blocked)
    const handleReconnect = useCallback(() => {
      try {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
          callback: async (resp) => {
            if (resp.error) { setSyncStatus("error"); return; }
            await connectSheets(resp.access_token);
          },
        });
        client.requestAccessToken();
      } catch(ex) { setSyncStatus("error"); }
    }, [connectSheets]);

    if(authState==="loading") return e(LoadingScreen, { message: loadMsg });
    if(authState==="login") return e(LoginScreen, { onLogin: handleLogin });

    return e("div", { style: { minHeight: "100vh", background: "#18181b", color: "#fff", maxWidth: 480, margin: "0 auto" } },
      state.activeView === "tracking" && state.trackingSession
        ? e(TrackingSession, { state, dispatch })
        : [
          e(NavBar, { key: "nav", activeView: state.activeView, dispatch, user, isConnected: authState==="ready", onSignOut: handleSignOut, syncing, syncStatus, onReconnect: handleReconnect }),
          e("div", { key: "content", style: { paddingBottom: 80 } },
            state.activeView === "dashboard" && e(Dashboard, { state, dispatch }),
            state.activeView === "schedule" && e(ScheduleSetup, { state, dispatch }),
            state.activeView === "workouts" && e(WorkoutBuilder, { state, dispatch }),
            state.activeView === "analytics" && e(Analytics, { state }),
            state.activeView === "settings" && e(DataSettings, { state, dispatch, onForceSync: () => syncToSheets(state), onReset: async () => {
              if (sheetsService.accessToken && sheetsService.spreadsheetId) await sheetsService.resetSpreadsheet();
              clearLocal();
              dispatch({type:"IMPORT_STATE",state:makeInitialState()});
            }}),
          ),
        ]
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));
})();
</script>
